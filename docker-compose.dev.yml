version: '3'

services:
  nodebb:
    build: .
    ports:
      - "4567:4567"
    volumes:
      - ./config.json:/app/config.json
      - ./public/uploads:/app/public/uploads
      - ./build:/app/build

  setup:
    build: .
    command: ./nodebb setup
    volumes:
      - ./config.json:/app/config.json
      - ./public/uploads:/app/public/uploads
      - ./build:/app/build
    environment:
      - NODEBB_ADMIN_USERNAME=admin
      - NODEBB_ADMIN_PASSWORD=change_this_password
      - NODEBB_ADMIN_EMAIL=admin@example.com
    profiles:
      - setup
